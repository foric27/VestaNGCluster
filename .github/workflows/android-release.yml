name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${GITHUB_WORKSPACE}/release-keystore.jks"
            {
              echo "ANDROID_KEYSTORE_FILE=${GITHUB_WORKSPACE}/release-keystore.jks"
              echo "ANDROID_KEYSTORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}"
              echo "ANDROID_KEY_ALIAS=${ANDROID_KEY_ALIAS}"
              echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}"
            } >> "${GITHUB_ENV}"
          else
            echo "Signing secrets are not configured; release APK will be assembled unsigned."
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Publish rolling release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="main-latest"
          RELEASE_NAME="Autobuild main"
          APK_PATH="app/build/outputs/apk/release/app-release.apk"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG_NAME}" --force

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${APK_PATH}#VestaNGCluster-${GITHUB_SHA::7}.apk" --clobber
          else
            gh release create "${TAG_NAME}" "${APK_PATH}#VestaNGCluster-${GITHUB_SHA::7}.apk" \
              --title "${RELEASE_NAME}" \
              --notes "Automatic build from commit ${GITHUB_SHA}" \
              --prerelease
          fi
