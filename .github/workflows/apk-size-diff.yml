name: APK Size Diff

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  apk-size-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install required Android packages
        run: |
          sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Build PR APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release.apk app-release-pr.apk

      - name: Checkout base
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          clean: false

      - name: Build base APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release.apk app-release-base.apk

      - name: Compare APK sizes
        id: compare
        run: |
          PR_SIZE=$(stat -c%s app-release-pr.apk)
          BASE_SIZE=$(stat -c%s app-release-base.apk)
          DIFF=$((PR_SIZE - BASE_SIZE))
          DIFF_KB=$((DIFF / 1024))
          PR_SIZE_MB=$(echo "scale=2; $PR_SIZE / 1024 / 1024" | bc)
          BASE_SIZE_MB=$(echo "scale=2; $BASE_SIZE / 1024 / 1024" | bc)
          
          if [ $DIFF -gt 0 ]; then
            SIGN="+"
          else
            SIGN=""
          fi
          
          echo "pr_size_mb=$PR_SIZE_MB" >> $GITHUB_OUTPUT
          echo "base_size_mb=$BASE_SIZE_MB" >> $GITHUB_OUTPUT
          echo "diff_kb=$DIFF_KB" >> $GITHUB_OUTPUT
          echo "sign=$SIGN" >> $GITHUB_OUTPUT
          echo "pr_size=$PR_SIZE" >> $GITHUB_OUTPUT
          echo "base_size=$BASE_SIZE" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const prSize = '${{ steps.compare.outputs.pr_size_mb }}';
            const baseSize = '${{ steps.compare.outputs.base_size_mb }}';
            const diffKb = '${{ steps.compare.outputs.diff_kb }}';
            const sign = '${{ steps.compare.outputs.sign }}';
            
            const body = `## APK Size Comparison
            
            | Metric | Base (main) | PR |
            |--------|-------------|-----|
            | **Size** | ${baseSize} MB | ${prSize} MB |
            | **Diff** | — | ${sign}${diffKb} KB |
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
