name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install required Android packages
        run: |
          sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Run unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest

      - name: Run lint
        run: |
          chmod +x ./gradlew
          ./gradlew lintDebug
