name: Lint Report

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install required Android packages
        run: |
          sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Run lint
        run: |
          chmod +x ./gradlew
          ./gradlew lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Publish lint results to PR
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
        continue-on-error: true

      - name: Comment lint summary
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'app/build/reports/lint-results-debug.xml';
            
            let summary = '## Lint Report\n\n';
            
            if (fs.existsSync(path)) {
              const xml = fs.readFileSync(path, 'utf8');
              const errors = (xml.match(/<error /g) || []).length;
              const warnings = (xml.match(/<warning /g) || []).length;
              
              summary += `| Type | Count |\n|------|-------|\n`;
              summary += `| Errors | ${errors} |\n`;
              summary += `| Warnings | ${warnings} |\n`;
              
              if (errors > 0) {
                summary += '\n❌ **Lint errors found!** Please fix them before merging.\n';
              } else if (warnings > 0) {
                summary += '\n⚠️ **Lint warnings found.** Consider addressing them.\n';
              } else {
                summary += '\n✅ **No lint issues found!**\n';
              }
            } else {
              summary += '⚠️ Lint report not found.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
