name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Привет! Спасибо за создание issue.
            
            Мы рассмотрим его в ближайшее время. Для ускорения обработки, пожалуйста, убедитесь что:
            - Вы используете последнюю версию приложения
            - Прикрепили логи (если применимо)
            - Описали шаги воспроизведения
            
            Срок ответа: обычно в течение 48 часов.
          pr-message: |
            🎉 Привет и спасибо за ваш первый PR!
            
            Мы ценим ваш вклад в проект. Вот что произойдёт дальше:
            - CI запустит тесты и lint автоматически
            - Мы проведём code review
            - После approval PR будет влит в `main`
            
            Если у вас есть вопросы — не стесняйтесь задавать их в комментариях.
