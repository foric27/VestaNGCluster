plugins {
    id 'com.android.application'
}

def signingProps = new Properties()
def signingPropsFile = rootProject.file('keystore.properties')
if (signingPropsFile.exists()) {
    signingPropsFile.withReader('UTF-8') { signingProps.load(it) }
}

def releaseStoreFile = System.getenv('ANDROID_KEYSTORE_FILE') ?: signingProps.getProperty('storeFile')
def releaseStorePassword = System.getenv('ANDROID_KEYSTORE_PASSWORD') ?: signingProps.getProperty('storePassword')
def releaseKeyAlias = System.getenv('ANDROID_KEY_ALIAS') ?: signingProps.getProperty('keyAlias')
def releaseKeyPassword = System.getenv('ANDROID_KEY_PASSWORD') ?: signingProps.getProperty('keyPassword')
if (releaseStoreFile != null) {
    releaseStoreFile = releaseStoreFile.replace('\\', '/')
}
def releaseSigningReady = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every { it != null && !it.toString().trim().isEmpty() }

android {
    namespace 'ru.foric27.cluster'
    compileSdk 36

    defaultConfig {
        applicationId 'ru.foric27.cluster'
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName '1.0.0-product'
    }

    signingConfigs {
        if (releaseSigningReady) {
            release {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            if (releaseSigningReady) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    packaging {
        resources {
            excludes += [
                    '/META-INF/{AL2.0,LGPL2.1}',
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt'
            ]
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.18.0'
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'com.google.android.material:material:1.13.0'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.3.0'
    implementation 'androidx.activity:activity:1.11.0'
    implementation 'androidx.fragment:fragment:1.8.9'
    implementation 'androidx.lifecycle:lifecycle-runtime:2.10.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel:2.10.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-savedstate:2.10.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-core:2.10.0'
    implementation 'androidx.savedstate:savedstate:1.3.3'
    implementation 'androidx.recyclerview:recyclerview:1.4.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'androidx.drawerlayout:drawerlayout:1.2.0'
    implementation 'androidx.customview:customview:1.2.0'
    implementation 'androidx.collection:collection:1.5.0'
    implementation 'androidx.annotation:annotation:1.9.1'
    implementation 'androidx.annotation:annotation-experimental:1.5.1'
    implementation 'androidx.transition:transition:1.5.1'
    implementation 'org.apache.ftpserver:ftpserver-core:1.2.1'
    implementation 'org.apache.mina:mina-core:2.2.5'
}
